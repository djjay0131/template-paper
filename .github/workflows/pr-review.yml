name: PR Review Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  paper-review:
    name: Paper Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for placeholder text
        id: placeholders
        run: |
          echo "## Placeholder Scan" >> $GITHUB_STEP_SUMMARY
          PLACEHOLDERS=$(grep -rn --include="*.tex" --include="*.md" --include="*.bib" \
            -E '(TBD|TODO|FIXME|XXX|PLACEHOLDER|Lorem ipsum|\{\{[A-Z_]+\}\})' \
            paper/ construction/ memory-bank/ 2>/dev/null || true)
          if [ -n "$PLACEHOLDERS" ]; then
            echo "::warning::Placeholder text found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$PLACEHOLDERS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "found=true" >> $GITHUB_OUTPUT
            echo "details<<EOF" >> $GITHUB_OUTPUT
            echo "$PLACEHOLDERS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No placeholders found." >> $GITHUB_STEP_SUMMARY
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Check citation matrix for unverified entries
        id: citations
        run: |
          echo "## Citation Matrix Check" >> $GITHUB_STEP_SUMMARY
          if [ -f construction/requirements/citation-matrix.md ]; then
            UNVERIFIED=$(grep -c '| N |' construction/requirements/citation-matrix.md 2>/dev/null || echo "0")
            FAILED=$(grep -c '| X |' construction/requirements/citation-matrix.md 2>/dev/null || echo "0")
            TOTAL=$(grep -c '^|' construction/requirements/citation-matrix.md 2>/dev/null || echo "0")
            TOTAL=$((TOTAL > 3 ? TOTAL - 3 : 0))
            echo "Total entries: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "Unverified: $UNVERIFIED" >> $GITHUB_STEP_SUMMARY
            echo "Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "unverified=$UNVERIFIED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::$FAILED citations failed verification"
            fi
          else
            echo "Citation matrix not found." >> $GITHUB_STEP_SUMMARY
            echo "unverified=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX (if present)
        id: compile
        run: |
          echo "## Compile Check" >> $GITHUB_STEP_SUMMARY
          TEX_FILE=""
          for dir in paper proposal; do
            if ls ${dir}/*.tex 1>/dev/null 2>&1; then
              TEX_FILE="${dir}/main.tex"
              break
            fi
          done
          if [ -n "$TEX_FILE" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-bibtex-extra biber latexmk > /dev/null 2>&1
            DIR=$(dirname "$TEX_FILE")
            cd "$DIR"
            ERRORS=0
            WARNINGS=0
            UNDEF_REFS=0
            if latexmk -pdf -interaction=nonstopmode main.tex > compile.log 2>&1; then
              echo "Compilation: SUCCESS" >> $GITHUB_STEP_SUMMARY
            else
              ERRORS=1
              echo "::error::LaTeX compilation failed"
              echo "Compilation: FAILED" >> $GITHUB_STEP_SUMMARY
            fi
            WARNINGS=$(grep -c "^LaTeX Warning" compile.log 2>/dev/null || echo "0")
            UNDEF_REFS=$(grep -c "undefined references" compile.log 2>/dev/null || echo "0")
            echo "Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
            echo "Undefined refs: $UNDEF_REFS" >> $GITHUB_STEP_SUMMARY
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "undef_refs=$UNDEF_REFS" >> $GITHUB_OUTPUT
          else
            echo "No LaTeX files found â€” skipping compile." >> $GITHUB_STEP_SUMMARY
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "warnings=0" >> $GITHUB_OUTPUT
            echo "undef_refs=0" >> $GITHUB_OUTPUT
          fi

      - name: Post review report
        uses: actions/github-script@v7
        with:
          script: |
            const placeholders = '${{ steps.placeholders.outputs.found }}' === 'true';
            const placeholderDetails = `${{ steps.placeholders.outputs.details }}` || 'None';
            const citTotal = '${{ steps.citations.outputs.total }}';
            const citUnverified = '${{ steps.citations.outputs.unverified }}';
            const citFailed = '${{ steps.citations.outputs.failed }}';
            const compErrors = '${{ steps.compile.outputs.errors }}';
            const compWarnings = '${{ steps.compile.outputs.warnings }}';
            const compUndef = '${{ steps.compile.outputs.undef_refs }}';

            const hasIssues = placeholders || citFailed > 0 || compErrors > 0;
            const verdict = hasIssues ? 'CHANGES REQUESTED' : 'APPROVED';
            const verdictEmoji = hasIssues ? '&#10060;' : '&#9989;';

            let issues = [];
            if (placeholders) issues.push('Placeholder text found in document files');
            if (citFailed > 0) issues.push(`${citFailed} citation(s) failed verification`);
            if (compErrors > 0) issues.push('LaTeX compilation failed');

            const body = `## Paper Review Report

            ### Citation Matrix
            - Total entries: ${citTotal}
            - Unverified: ${citUnverified}
            - Failed: ${citFailed}

            ### Compile Status
            - Errors: ${compErrors}
            - Warnings: ${compWarnings}
            - Undefined references: ${compUndef}

            ### Placeholder Scan
            ${placeholders ? '```\n' + placeholderDetails + '\n```' : 'Clean â€” no placeholders found.'}

            ### Verdict: ${verdictEmoji} ${verdict}
            ${issues.length > 0 ? '### Issues\n' + issues.map((i, idx) => `${idx + 1}. ${i}`).join('\n') : 'All checks passed.'}

            ---
            *Generated by Paper Review Bot*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
